name: Android Build & Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Manuel tetikleme için

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      continue-on-error: true

    - name: Check if Gradle wrapper exists, generate if missing
      run: |
        if [ ! -f "gradlew" ]; then
          echo "Gradle wrapper not found, downloading and generating..."
          gradle wrapper --gradle-version 9.3.1
        fi

    - name: Create local.properties & Setup Secrets
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> local.properties
        echo "GNEWS_API_KEY=${{ secrets.GNEWS_API_KEY }}" >> local.properties
        echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> local.properties
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: GundemAI-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
